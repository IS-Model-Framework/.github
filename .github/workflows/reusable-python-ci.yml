name: Reusable - Complete Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.11'
      ruff-config-path:
        description: 'Path to custom ruff config'
        required: false
        type: string
        default: ''
      install-command:
        description: 'Command to install project dependencies'
        required: false
        type: string
        default: 'pip install -e ".[dev]"'
      skip-commit-check:
        description: 'Skip commit message check'
        required: false
        type: boolean
        default: false
      skip-format-check:
        description: 'Skip format check'
        required: false
        type: boolean
        default: false
      skip-type-check:
        description: 'Skip type check'
        required: false
        type: boolean
        default: false
      skip-tests:
        description: 'Skip tests'
        required: false
        type: boolean
        default: false
      skip-precommit:
        description: 'Skip pre-commit checks'
        required: false
        type: boolean
        default: false
      skip-pr-size-check:
        description: 'Skip pull request size check'
        required: false
        type: boolean
        default: false
      pr-size-warning-threshold:
        description: 'Warn when counted added lines are greater than this value'
        required: false
        type: number
        default: 300
      pr-size-block-threshold:
        description: 'Fail when counted added lines are greater than this value'
        required: false
        type: number
        default: 500

jobs:
  pr-size-check:
    if: ${{ !inputs.skip-pr-size-check }}
    uses: ./.github/workflows/reusable-pr-size-check.yml
    with:
      python-version: ${{ inputs.python-version }}
      warning-threshold: ${{ inputs.pr-size-warning-threshold }}
      block-threshold: ${{ inputs.pr-size-block-threshold }}

  pre-commit:
    if: ${{ !inputs.skip-precommit }}
    uses: ./.github/workflows/reusable-precommit.yml
    with:
      python-version: ${{ inputs.python-version }}
  
  commit-check:
    if: ${{ !inputs.skip-commit-check }}
    needs: pre-commit
    uses: ./.github/workflows/reusable-commit-check.yml
    with:
      python-version: ${{ inputs.python-version }}
  
  format-check:
    if: ${{ !inputs.skip-format-check }}
    needs: pre-commit
    uses: ./.github/workflows/reusable-format-check.yml
    with:
      python-version: ${{ inputs.python-version }}
      ruff-config-path: ${{ inputs.ruff-config-path }}
      install-command: ${{ inputs.install-command }}
  
  type-check:
    if: ${{ !inputs.skip-type-check }}
    needs: pre-commit
    uses: ./.github/workflows/reusable-type-check.yml
    with:
      python-version: ${{ inputs.python-version }}
      install-command: ${{ inputs.install-command }}
  
  tests:
    if: ${{ !inputs.skip-tests }}
    needs: pre-commit
    uses: ./.github/workflows/reusable-tests.yml
    with:
      python-version: ${{ inputs.python-version }}
      install-command: ${{ inputs.install-command }}

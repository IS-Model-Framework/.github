name: Reusable - Commit Check

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.11'

jobs:
  check-commit-logs:
    runs-on: ubuntu-latest
    name: Check Latest Commit Message
    
    steps:
    - name: Checkout project code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        repository: ${{ github.repository }}
        submodules: recursive
    
    - name: Checkout shared CI scripts
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/.github
        path: .ci-shared
        sparse-checkout: |
          scripts
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}
    
    - name: Check latest commit message format
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          python .ci-shared/scripts/check_mr_logs.py \
            --start-rev ${{ github.event.pull_request.base.sha }} \
            --end-rev ${{ github.event.pull_request.head.sha }}
        else
          python .ci-shared/scripts/check_mr_logs.py \
            --start-rev ${{ github.event.before }} \
            --end-rev ${{ github.event.after }}
        fi
